services:

  # ── Init: copia el migrate.sql del repo al volumen compartido con MySQL ──────
  db-init:
    image: alpine:3.19
    container_name: rdam_db_init
    volumes:
      - mysql_init:/init
    command: >
      sh -c "
        apk add --no-cache git &&
        if [ ! -f /init/migrate.sql ]; then
          echo 'Clonando repo...' &&
          git clone --depth=1 https://github.com/lautiacvd-99/RDAM.git /tmp/rdam &&
          cp /tmp/rdam/src/config/migrate.sql /init/migrate.sql &&
          echo 'OK: migrate.sql copiado.'
        else
          echo 'migrate.sql ya existe, saltando.'
        fi
      "
    restart: "no"

  # ── MySQL ────────────────────────────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: rdam_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: rdam_db
      MYSQL_USER: rdam
      MYSQL_PASSWORD: rdampass
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - mysql_init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-u", "rdam", "-prdampass", "--silent"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 30s
    depends_on:
      db-init:
        condition: service_completed_successfully

  # ── Redis ────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: rdam_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Pasarela PlusPagos ───────────────────────────────────────────────────────
  pasarela:
    build:
      context: .
      dockerfile_inline: |
        FROM node:20-alpine
        RUN apk add --no-cache git
        WORKDIR /app
        RUN git clone --depth=1 https://github.com/lautiacvd-99/RDAM.git .
        WORKDIR /app/pluspagos-mock-simple
        RUN npm ci --omit=dev
        EXPOSE 3000
        CMD ["node", "server.js"]
    container_name: rdam_pasarela
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      WEBHOOK_URL: http://backend:3001/v1/pagos/webhook

  # ── Backend ──────────────────────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile_inline: |
        FROM node:20-alpine
        RUN apk add --no-cache git
        WORKDIR /app
        RUN git clone --depth=1 https://github.com/lautiacvd-99/RDAM.git .
        RUN npm ci --omit=dev
        RUN mkdir -p storage/pdfs logs
        EXPOSE 3001
        CMD ["node", "src/app.js"]
    container_name: rdam_backend
    restart: on-failure:10
    ports:
      - "3001:3001"
    env_file:
      - .env.docker
    volumes:
      - pdf_storage:/app/storage/pdfs
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      pasarela:
        condition: service_started

volumes:
  mysql_data:
  redis_data:
  pdf_storage:
  mysql_init:
